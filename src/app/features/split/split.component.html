<div class="tool-page-container">
    <div class="tool-controls-wrapper">
        <div class="tool-page">
            <h1>{{ resultPdfUrl() ? '¡PDF Dividido!' : 'Dividir PDF' }}</h1>

            <div *ngIf="resultPdfUrl()" class="result-view-container">
                <p class="subtitle">Se han extraído las páginas seleccionadas con éxito.</p>
                <div class="final-result-browser">
                    <iframe [src]="resultPdfUrl()" frameborder="0"></iframe>
                </div>
                <div class="result-actions">
                    <a [href]="resultPdfUrl()" download="dividido_docucraft.pdf" class="btn-action btn-download">📥 Descargar PDF</a>
                    <button class="btn-secondary" (click)="editAgain()">⬅️ Cambiar rangos</button>
                    <button class="btn-text-only" (click)="fullReset()">Limpiar todo</button>
                </div>
            </div>

            <div *ngIf="!resultPdfUrl()">
                <p class="subtitle">Extrae páginas de tu archivo PDF de forma fácil.</p>
                <button class="btn-toggle" *ngIf="!selectedFile() && !isUploaderVisible()" (click)="toggleUploader()">➕ Seleccionar PDF</button>

                <div class="uploader-wrapper" *ngIf="isUploaderVisible()">
                    <app-file-uploader (onFilesReady)="handleFile($event)" (onClose)="toggleUploader()"></app-file-uploader>
                </div>

                <div *ngIf="selectedFile() && !isUploaderVisible()" class="config-area">
                    <div class="file-item single-card">
                        <div class="file-info-left">
                            <span class="file-index">1</span>
                            <span class="file-name">📄 {{ selectedFile()?.name }}</span>
                        </div>
                        <button type="button" (click)="selectedFile.set(null)" class="btn-remove">✕ Quitar</button>
                    </div>

                    <div class="input-group">
                        <label>Rango de páginas:</label>
                        <input type="text" [(ngModel)]="range" class="custom-input" placeholder="Ej: 1-5, 8-10">
                    </div>

                    <button class="btn-action" (click)="processSplit()" [disabled]="isProcessing()">
                        {{ isProcessing() ? 'Procesando...' : 'Dividir PDF' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="preview-sidebar" *ngIf="selectedFile() && !resultPdfUrl()">
        <div class="preview-header">Visor de referencia</div>
        <iframe [src]="getSafeUrl(selectedFile())"></iframe>
    </div>
</div>
